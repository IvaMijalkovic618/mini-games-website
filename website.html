<!DOCTYPE html>
<html>
<head>
  <title>My Projects</title>

  <style>
    body {
      font-family: Arial;
      margin: 0;
      background-color: lightblue;
      color: black;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background-color: steelblue;
      color: white;
    }

    h1 {
      margin: 0;
    }

    #logout {
      padding: 8px 16px;
      border: none;
      border-radius: 5px;
      background-color: crimson;
      color: white;
      cursor: pointer;
    }

    #logout:hover {
      background-color: red;
    }

    .container {
      display: flex;
      justify-content: center;
      gap: 30px;
      margin-top: 80px;
      flex-wrap: wrap;
    }

    .card {
      background-color: white;
      color: black;
      padding: 25px;
      width: 260px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 5px 5px 15px gray;
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    button.play {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background-color: royalblue;
      color: white;
      cursor: pointer;
      margin-top: 10px;
    }

    button.play:hover {
      background-color: blue;
    }
  </style>
</head>

<body>

<header>
  <h1 id="welcome"></h1>
  <button id="logout" onclick="logout()">Logout</button>
</header>

<div class="container">

  <div class="card">
    <h2>🎮 Memory Game</h2>
    <button class="play" onclick="openGame('memory.html')">Play</button>
  </div>

  <div class="card">
    <h2>🗺️ Treasure Hunt</h2>
    <button class="play" onclick="openGame('treasure.html')">Play</button>
  </div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const user = params.get("user");

document.getElementById("welcome").textContent = "Welcome, " + user + "!";

function openGame(file) {
  window.location.href = file;
}

function logout() {
  window.location.href = "login.html";
}
</script>

</body>
</html>
