<!DOCTYPE html>
<html>
<head>
  <title>Memory Game</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background-color: #f0f0f0;
    }

    h1 {
      font-size: 40px;
      color: #333;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(4, 100px);
      gap: 10px;
      justify-content: center;
      margin: 20px auto;
    }

    .card {
      width: 100px;
      height: 100px;
      background-color: #3498db;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      cursor: pointer;
    }

    button {
      padding: 10px 20px;
      font-size: 16px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<h1>Memory Game</h1>
<div id="grid"></div>
<button onclick="startGame()">Restart</button>

<script>
const emojis = ["⭐","❤️","🐱","🚀","🐶","🌙","🍎","🌈"];
let cards = [];
let firstCard = null;
let secondCard = null;
let lockBoard = false;

function shuffle(array) {
  return array.sort(() => Math.random() - 0.5);
}

function startGame() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  cards = shuffle([...emojis, ...emojis]);

  firstCard = null;
  secondCard = null;
  lockBoard = false;

  cards.forEach((emoji, index) => {
    const div = document.createElement("div");
    div.classList.add("card");
    div.textContent = "❓";
    div.dataset.value = emoji;

    div.addEventListener("click", () => handleClick(div));

    grid.appendChild(div);
  });
}

function handleClick(card) {
  if (lockBoard) return;
  if (card === firstCard) return;

  card.textContent = card.dataset.value;

  if (!firstCard) {
    firstCard = card;
    return;
  }

  secondCard = card;
  lockBoard = true;

  if (firstCard.dataset.value === secondCard.dataset.value) {
    firstCard = null;
    secondCard = null;
    lockBoard = false;

    checkWin();
  } else {
    setTimeout(() => {
      firstCard.textContent = "❓";
      secondCard.textContent = "❓";

      firstCard = null;
      secondCard = null;
      lockBoard = false;
    }, 1000);
  }
}

function checkWin() {
  const allCards = document.querySelectorAll(".card");
  const allMatched = [...allCards].every(
    card => card.textContent !== "❓"
  );

  if (allMatched) {
    setTimeout(() => {
      alert("🎉 You won!");
    }, 300);
  }
}

startGame();
</script>

</body>
</html>
